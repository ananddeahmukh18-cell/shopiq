\<!DOCTYPE html>
<html>
<head>
<title>ShopIQ POS</title>
<style>
body { font-family: Arial; background:#0b1220; color:white; padding:20px; }
button { padding:10px; margin:5px; }
</style>
</head>
<body>

<h2>ShopIQ POS</h2>

<button onclick="newSale()">+ New Sale</button>

<table border="1" width="100%" id="table">
<tr><th>Customer</th><th>Amount</th></tr>
</table>

<script>

/* LOAD DATA */
function loadSales() {
  const data = JSON.parse(localStorage.getItem("sales")) || [];

  let table = document.getElementById("table");
  table.innerHTML = "<tr><th>Customer</th><th>Amount</th></tr>";

  data.forEach(s => {
    table.innerHTML += `<tr><td>${s.customer}</td><td>₹${s.amount}</td></tr>`;
  });
}

/* ADD SALE */
function newSale() {
  let customer = prompt("Customer:");
  let amount = prompt("Amount:");

  let data = JSON.parse(localStorage.getItem("sales")) || [];
  data.push({ customer, amount });

  localStorage.setItem("sales", JSON.stringify(data));

  loadSales();
}

/* INIT */
loadSales();

</script>

</body>
</html>
